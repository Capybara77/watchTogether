services:
  watchtogether:
    build:
      context: .
      args:
        PLAYWRIGHT_VERSION: 1.52.0
    ports:
      - "8090:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      BrowserStream__ViewportWidth: 1366
      BrowserStream__ViewportHeight: 768
      BrowserStream__CaptureFps: 24
      BrowserStream__VideoBitrateKbps: 2500
      BrowserStream__AudioBitrateKbps: 128
      BrowserStream__NavigationTimeoutMs: 30000
    shm_size: "1gb"
    restart: unless-stopped
